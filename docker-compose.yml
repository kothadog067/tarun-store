version: "3.9"

x-common-env: &common-env
  DD_AGENT_HOST: datadog-agent
  DD_TRACE_AGENT_PORT: "8126"
  DD_LOGS_INJECTION: "true"
  DD_RUNTIME_METRICS_ENABLED: "true"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tarun
      POSTGRES_PASSWORD: tarunstore
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarun"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: datadoghq.com
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - "8126:8126"  # APM
      - "8125:8125/udp"  # DogStatsD

  frontend:
    build: ./services/frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    environment:
      VITE_API_URL: http://localhost:8000

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      DD_SERVICE: api-gateway
      DD_ENV: development
      PRODUCT_SERVICE_URL: http://product-service:8001
      USER_SERVICE_URL: http://user-service:8002
      CART_SERVICE_URL: http://cart-service:8003
      ORDER_SERVICE_URL: http://order-service:8004
      PAYMENT_SERVICE_URL: http://payment-service:8005
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
    depends_on:
      - product-service
      - user-service
      - cart-service
      - order-service
      - payment-service
      - notification-service

  product-service:
    build: ./services/product-service
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      DD_SERVICE: product-service
      DD_ENV: development
      DATABASE_URL: postgresql://tarun:tarunstore@postgres:5432/products_db
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ./services/user-service
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      DD_SERVICE: user-service
      DD_ENV: development
      DATABASE_URL: postgresql://tarun:tarunstore@postgres:5432/users_db
      JWT_SECRET: tarun-store-secret-key-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy

  cart-service:
    build: ./services/cart-service
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      DD_SERVICE: cart-service
      DD_ENV: development
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      DD_SERVICE: order-service
      DD_ENV: development
      DATABASE_URL: postgresql://tarun:tarunstore@postgres:5432/orders_db
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
      PAYMENT_SERVICE_URL: http://payment-service:8005
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build: ./services/payment-service
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      DD_SERVICE: payment-service
      DD_ENV: development
      ORDER_SERVICE_URL: http://order-service:8004

  notification-service:
    build: ./services/notification-service
    ports:
      - "8006:8006"
    environment:
      <<: *common-env
      DD_SERVICE: notification-service
      DD_ENV: development

volumes:
  postgres_data:
