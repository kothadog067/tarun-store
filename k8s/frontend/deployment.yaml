apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tarun-store
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/PROJECT_ID/frontend:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tarun-store
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
