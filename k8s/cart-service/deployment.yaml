apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: tarun-store
  labels:
    app: cart-service
    tags.datadoghq.com/service: "cart-service"
    tags.datadoghq.com/env: "production"
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        tags.datadoghq.com/service: "cart-service"
        tags.datadoghq.com/env: "production"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
    spec:
      containers:
        - name: cart-service
          image: gcr.io/PROJECT_ID/cart-service:IMAGE_TAG
          ports:
            - containerPort: 8003
          env:
            - name: DD_SERVICE
              value: "cart-service"
            - name: DD_ENV
              value: "production"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true" 
            - name: REDIS_URL
              value: "redis://redis:6379/0" 
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: tarun-store
  labels:
    app: cart-service
spec:
  selector:
    app: cart-service
  ports:
    - port: 8003
      targetPort: 8003
      name: http
