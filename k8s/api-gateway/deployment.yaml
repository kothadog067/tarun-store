apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: tarun-store
  labels:
    app: api-gateway
    tags.datadoghq.com/service: "api-gateway"
    tags.datadoghq.com/env: "production"
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tags.datadoghq.com/service: "api-gateway"
        tags.datadoghq.com/env: "production"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        admission.datadoghq.com/python-lib.version: "latest"
    spec:
      containers:
        - name: api-gateway
          image: gcr.io/PROJECT_ID/api-gateway:IMAGE_TAG
          ports:
            - containerPort: 8000
          env:
            - name: DD_SERVICE
              value: "api-gateway"
            - name: DD_ENV
              value: "production"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true" 
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8001"
            - name: USER_SERVICE_URL
              value: "http://user-service:8002"
            - name: CART_SERVICE_URL
              value: "http://cart-service:8003"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8004"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8005"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8006" 
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: tarun-store
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      name: http
