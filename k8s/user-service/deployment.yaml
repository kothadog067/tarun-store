apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: tarun-store
  labels:
    app: user-service
    tags.datadoghq.com/service: "user-service"
    tags.datadoghq.com/env: "production"
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tags.datadoghq.com/service: "user-service"
        tags.datadoghq.com/env: "production"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        admission.datadoghq.com/python-lib.version: "latest"
    spec:
      containers:
        - name: user-service
          image: gcr.io/PROJECT_ID/user-service:IMAGE_TAG
          ports:
            - containerPort: 8002
          env:
            - name: DD_SERVICE
              value: "user-service"
            - name: DD_ENV
              value: "production"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true" 
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tarun-store-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://tarun:$(POSTGRES_PASSWORD)@postgres:5432/users_db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tarun-store-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: 128Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: tarun-store
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 8002
      targetPort: 8002
      name: http
